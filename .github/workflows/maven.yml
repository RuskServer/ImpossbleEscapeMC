name: Maven Build + CalVer Release

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Generate CalVer
      id: calver
      run: |
        VERSION=$(date +'%Y.%m.%d')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set Maven Version
      run: |
        mvn -B versions:set \
          -DnewVersion=${{ steps.calver.outputs.version }} \
          -DgenerateBackupPoms=false

    - name: Build
      run: mvn -B package --file pom.xml

    - name: Get Jar
      id: jar
      run: |
        JAR=$(ls target/*.jar | head -n 1)
        echo "jar=$JAR" >> $GITHUB_OUTPUT

    # PR用artifact
    - name: Upload PR Artifact
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: plugin-pr-${{ github.event.pull_request.number }}
        path: ${{ steps.jar.outputs.jar }}

    # changelog生成 (pushのみ)
    - name: Generate Changelog
      if: github.event_name == 'push'
      run: |
        git log -10 --pretty=format:"- %s (%h)" > CHANGELOG.md

    # Release (pushのみ)
    - name: Create or Update Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.calver.outputs.version }}
        name: ${{ steps.calver.outputs.version }}
        body_path: CHANGELOG.md
        files: ${{ steps.jar.outputs.jar }}
        replace_assets: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
