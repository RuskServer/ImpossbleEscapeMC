name: ImpossbleEscapeMC
version: '1.0-SNAPSHOT'
main: com.lunar_prototype.impossbleEscapeMC.ImpossbleEscapeMC
api-version: '1.21'
softdepend: [Citizens]

commands:
  getitem:
    description: Get a special item.
    usage: /getitem
    permission: impossbleescapemc.getitem
    permission-message: You do not have permission to use this command.
  scavspawn:
    description: 自分の位置にAI搭載SCAVを召喚します。
    permission: op
  attachment:
    description: 銃のアタッチメントGUIを開きます。
    usage: /attachment
  mg:
    description: ミニゲーム管理コマンド
    permission: op
  itemreload:
    description: アイテム設定をリロードします。
    permission: op
  raid:
    description: レイドシステム管理・出撃コマンド
    permission: op
  party:
    description: パーティーシステムコマンド
    usage: /party <subcommand>
  loot:
    description: ルートシステム管理コマンド
    permission: op
  trader:
    description: トレーダーシステム管理・利用コマンド
    permission: op
  market:
    description: グローバルマーケットを利用します。
    usage: /market
  quest:
    description: クエストシステム管理コマンド
    permission: op
  settings:
    description: プレイヤーの操作設定やキーバインドを変更します。
    usage: /settings